<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1170" fill="none">
  <rect width="1560" height="1170" fill="#f3f8f7"/>

  <!-- thread lines (drawn first, so wheel/hub/text sit on top) -->
  <g stroke="#0f7d70" stroke-width="3" stroke-linecap="round">
    <line x1="500" y1="250" x2="1050" y2="460"/>
    <line x1="905" y1="598" x2="1082" y2="368"/>
    <line x1="500" y1="780" x2="665" y2="690"/>
  </g>

  <!-- big wheel -->
  <circle cx="355" cy="480" r="275" stroke="#16221f" stroke-width="26"/>
  <g stroke="#5c716d" stroke-width="9" stroke-linecap="round">
    <line x1="355" y1="480" x2="355" y2="215"/>
    <line x1="355" y1="480" x2="500" y2="240"/>
    <line x1="355" y1="480" x2="592" y2="365"/>
    <line x1="355" y1="480" x2="625" y2="480"/>
    <line x1="355" y1="480" x2="592" y2="595"/>
    <line x1="355" y1="480" x2="500" y2="720"/>
    <line x1="355" y1="480" x2="355" y2="745"/>
    <line x1="355" y1="480" x2="210" y2="720"/>
    <line x1="355" y1="480" x2="118" y2="595"/>
    <line x1="355" y1="480" x2="85" y2="480"/>
    <line x1="355" y1="480" x2="118" y2="365"/>
    <line x1="355" y1="480" x2="210" y2="240"/>
  </g>
  <circle cx="355" cy="480" r="32" fill="#16221f"/>
  <circle cx="355" cy="480" r="20" fill="#f3f8f7"/>
  <circle cx="355" cy="480" r="12" fill="#0f7d70"/>

  <!-- post from big wheel hub down to base -->
  <line x1="355" y1="510" x2="345" y2="775" stroke="#26332f" stroke-width="16" stroke-linecap="round"/>

  <!-- small starburst wheel -->
  <g stroke="#5c716d" stroke-width="5" stroke-linecap="round">
    <line x1="490" y1="780" x2="490" y2="675"/>
    <line x1="490" y1="780" x2="565" y2="700"/>
    <line x1="490" y1="780" x2="595" y2="750"/>
    <line x1="490" y1="780" x2="595" y2="810"/>
    <line x1="490" y1="780" x2="565" y2="860"/>
    <line x1="490" y1="780" x2="490" y2="885"/>
    <line x1="490" y1="780" x2="415" y2="860"/>
    <line x1="490" y1="780" x2="385" y2="810"/>
    <line x1="490" y1="780" x2="385" y2="750"/>
    <line x1="490" y1="780" x2="415" y2="700"/>
  </g>
  <circle cx="490" cy="780" r="20" fill="#16221f"/>
  <circle cx="490" cy="780" r="12" fill="#f3f8f7"/>
  <circle cx="490" cy="780" r="7" fill="#0f7d70"/>

  <!-- base plank -->
  <polygon points="300,780 1160,722 1160,748 300,806" fill="#16221f" fill-opacity="0.08" stroke="#b7d0cd" stroke-width="3"/>
  <line x1="330" y1="774" x2="1130" y2="720" stroke="#0f7d70" stroke-width="4"/>
  <line x1="330" y1="791" x2="1130" y2="737" stroke="#0f7d70" stroke-width="4"/>

  <!-- legs -->
  <line x1="325" y1="783" x2="200" y2="1085" stroke="#46605c" stroke-width="20" stroke-linecap="round"/>
  <line x1="1090" y1="735" x2="1170" y2="1065" stroke="#46605c" stroke-width="20" stroke-linecap="round"/>

  <!-- flyer assembly (right side) -->
  <line x1="1085" y1="730" x2="1085" y2="420" stroke="#1f2e2a" stroke-width="14" stroke-linecap="round"/>
  <clipPath id="flyerWheelClip">
    <circle cx="1085" cy="420" r="55"/>
  </clipPath>
  <circle cx="1085" cy="420" r="55" fill="#16221f"/>
  <g clip-path="url(#flyerWheelClip)" stroke="#0f7d70" stroke-width="6">
    <line x1="1030" y1="402" x2="1140" y2="402"/>
    <line x1="1030" y1="420" x2="1140" y2="420"/>
    <line x1="1030" y1="438" x2="1140" y2="438"/>
  </g>
  <line x1="1085" y1="382" x2="1085" y2="362" stroke="#16221f" stroke-width="10" stroke-linecap="round"/>
  <circle cx="1085" cy="358" r="15" fill="#16221f"/>

  <!-- hand/crank mechanism below the flyer wheel -->
  <line x1="1075" y1="478" x2="960" y2="598" stroke="#1f2e2a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="1075" cy="478" r="11" fill="#16221f"/>
  <circle cx="1100" cy="500" r="9" fill="#16221f"/>
  <circle cx="1121" cy="517" r="8" fill="#16221f"/>
  <line x1="1075" y1="478" x2="1100" y2="500" stroke="#16221f" stroke-width="7" stroke-linecap="round"/>
  <line x1="1100" y1="500" x2="1121" y2="517" stroke="#16221f" stroke-width="7" stroke-linecap="round"/>

  <!-- solid backing so the wheel spokes/threads behind the wordmark don't show through it -->
  <rect x="385" y="443" width="1140" height="290" rx="16" fill="#f3f8f7" stroke="#b7d0cd" stroke-width="4"/>

  <!-- wordmark (2x — bottom/left edges anchored to the same spot as before, growing up/right) -->
  <text x="398" y="667" font-family="'Poppins','Inter',system-ui,sans-serif" font-weight="800" font-size="236" letter-spacing="-4">
    <tspan fill="#0f7d70">PDF</tspan><tspan fill="#16221f">Loom</tspan>
  </text>
</svg>
